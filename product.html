<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — DhupQwik</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--ink-muted); font-size: 14px; margin-bottom: 32px;
      transition: var(--transition);
    }
    .back-link:hover { color: var(--saffron); }

    .product-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      align-items: start;
    }
    @media (max-width: 720px) {
      .product-detail { grid-template-columns: 1fr; gap: 28px; }
    }

    /* ── Image Gallery ─────────────────────────────────────── */
    .gallery {
      position: sticky;
      top: 80px;
    }

    /* ✅ FIX: Main image fills the container fully, no empty space */
    .gallery-main {
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--paper);
      border: 1px solid var(--border);
    }
    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;    /* fills the box, crops neatly — no empty space */
      object-position: center top; /* shows face/top of garment first */
      display: block;
      transition: opacity 0.25s;
    }
    .gallery-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      color: var(--border);
    }

    /* ✅ FIX: Thumbnail strip — fixed square thumbnails, no overflow issues */
    .gallery-thumbs {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
    }
    .gallery-thumb-wrap {
      flex-shrink: 0;
      width: 68px;
      height: 85px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      transition: var(--transition);
      background: var(--paper);
    }
    .gallery-thumb-wrap:hover { border-color: var(--saffron); }
    .gallery-thumb-wrap.active { border-color: var(--saffron); }
    .gallery-thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Product Info ───────────────────────────────────────── */
    .product-category {
      display: inline-block; background: var(--paper); color: var(--ink-muted);
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px;
    }
    .product-name { font-size: clamp(26px, 4vw, 38px); margin-bottom: 12px; line-height: 1.15; }
    .product-detail-price {
      font-size: 32px; font-weight: 700; color: var(--saffron); margin-bottom: 4px;
    }
    .product-detail-price::before { content: '₹'; font-size: 20px; }
    .cod-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #d4edda; color: #155724; font-size: 12px; font-weight: 600;
      padding: 4px 12px; border-radius: 20px; margin-bottom: 24px;
    }
    .product-divider { height: 1px; background: var(--border); margin: 24px 0; }
    .product-desc { color: var(--ink-soft); font-size: 15px; line-height: 1.7; margin-bottom: 28px; }

    .size-label {
      font-size: 13px; font-weight: 600; color: var(--ink-soft);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
    }
    .sizes-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
    .size-btn {
      width: 48px; height: 48px; border-radius: var(--radius);
      border: 1.5px solid var(--border); font-size: 14px; font-weight: 600;
      color: var(--ink-soft); background: var(--white); cursor: pointer; transition: var(--transition);
    }
    .size-btn:hover { border-color: var(--saffron); color: var(--saffron); }
    .size-btn.selected { background: var(--saffron); border-color: var(--saffron); color: var(--white); }

    .qty-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .qty-label { font-size: 13px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.5px; }
    .qty-controls {
      display: flex; align-items: center;
      border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden;
    }
    .qty-btn {
      width: 40px; height: 40px; background: var(--paper);
      color: var(--ink); font-size: 18px; font-weight: 500; transition: var(--transition);
    }
    .qty-btn:hover { background: var(--border); }
    .qty-value {
      width: 48px; text-align: center; font-size: 16px; font-weight: 600;
      border-left: 1px solid var(--border); border-right: 1px solid var(--border);
      height: 40px; display: grid; place-items: center;
    }

    .action-btns { display: flex; gap: 12px; flex-wrap: wrap; }
    .action-btns .btn { flex: 1; min-width: 140px; }
  </style>
</head>
<body>

<header class="site-header">
  <nav class="nav-inner">
    <a href="index.html" class="nav-logo">Dhup<span>Qwik</span></a>
    <div class="nav-links">
      <a href="orders.html">My Orders</a>
      <span id="nav-phone" style="font-size:13px; color:var(--ink-muted);"></span>
      <button id="nav-logout-btn" style="display:none; color:var(--ink-muted); font-size:13px;">Logout</button>
      <a href="cart.html" class="cart-btn">
        🛒 Cart <span class="cart-count" id="cart-count">0</span>
      </a>
    </div>
  </nav>
</header>

<div class="page-container">
  <a href="index.html" class="back-link">← Back to Shop</a>

  <div class="loading-wrap" id="loading"><div class="spinner"></div></div>
  <div id="product-detail" style="display:none;" class="product-detail"></div>
  <div class="empty-state" id="error-state" style="display:none;">
    <div class="empty-state-icon">⚠️</div>
    <h3>Product not found</h3>
    <p>This product may no longer be available.</p>
    <a href="index.html" class="btn btn-primary">Back to Shop</a>
  </div>
</div>

<footer class="site-footer">
  <strong>DhupQwik</strong> — Cash on Delivery Only · Made by joyankush
</footer>

<script src="utils.js"></script>
<script>
  let currentProduct = null;
  let selectedSize   = null;
  let quantity       = 1;
  let images         = [];
  let currentIdx     = 0;

  function getProductId() {
    return new URLSearchParams(window.location.search).get('id');
  }

  async function loadProduct() {
    const id = getProductId();
    if (!id) { showError(); return; }
    try {
      const res  = await fetch(`${API_BASE}/products/${id}`);
      const data = await res.json();
      if (data && data._id) {
        currentProduct = data;
        renderProduct(data);
      } else {
        showError();
      }
    } catch { showError(); }
  }

  function renderProduct(p) {
    document.title = `${p.name} — DhupQwik`;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('product-detail').style.display = 'grid';

    // Support both old single image and new images array
    images = (p.images && p.images.length > 0)
      ? p.images
      : (p.image ? [p.image] : []);

    selectedSize = p.sizes?.[0] || 'M';
    currentIdx   = 0;

    const sizesHTML = (p.sizes || ['S','M','L','XL']).map(s => `
      <button class="size-btn ${s === selectedSize ? 'selected' : ''}"
        onclick="selectSize('${s}')" id="size-${s}">${s}</button>
    `).join('');

    // ✅ FIX: Gallery uses proper CSS classes, no inline max-width override
    const mainImgHTML = images.length > 0
      ? `<img id="main-img" src="${images[0]}" alt="${p.name}"/>`
      : `<div class="gallery-placeholder">👕</div>`;

    const thumbsHTML = images.length > 1
      ? `<div class="gallery-thumbs">
          ${images.map((url, i) => `
            <div class="gallery-thumb-wrap ${i === 0 ? 'active' : ''}"
              onclick="switchImage(${i})" id="thumb-${i}">
              <img src="${url}" alt="view ${i + 1}"/>
            </div>
          `).join('')}
        </div>`
      : '';

    document.getElementById('product-detail').innerHTML = `
      <div class="gallery">
        <div class="gallery-main">${mainImgHTML}</div>
        ${thumbsHTML}
      </div>

      <div>
        <span class="product-category">👔 Clothes</span>
        <h1 class="product-name">${p.name}</h1>
        <div class="product-detail-price">${p.price.toLocaleString('en-IN')}</div>
        <div class="cod-badge">💵 Cash on Delivery</div>
        <div class="product-divider"></div>
        <p class="product-desc">${p.description}</p>

        <div class="size-label">Select Size</div>
        <div class="sizes-row">${sizesHTML}</div>

        <div class="qty-row">
          <span class="qty-label">Qty</span>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <div class="qty-value" id="qty-display">1</div>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
        </div>

        <div class="action-btns">
          <button class="btn btn-primary btn-lg" onclick="handleAddToCart()">
            🛒 Add to Cart
          </button>
          <button class="btn btn-outline btn-lg" onclick="handleBuyNow()">
            Buy Now
          </button>
        </div>

        ${p.stock > 0 ? `<p style="margin-top:16px;font-size:13px;color:var(--green);">✅ ${p.stock} in stock</p>` : ''}
      </div>
    `;
  }

  // ✅ Switch main image on thumbnail click
  function switchImage(index) {
    currentIdx = index;
    const mainImg = document.getElementById('main-img');
    if (mainImg) {
      mainImg.style.opacity = '0';
      setTimeout(() => {
        mainImg.src = images[index];
        mainImg.style.opacity = '1';
      }, 150);
    }
    // Update active thumbnail border
    document.querySelectorAll('.gallery-thumb-wrap').forEach((t, i) => {
      t.classList.toggle('active', i === index);
    });
  }

  function selectSize(size) {
    selectedSize = size;
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById(`size-${size}`)?.classList.add('selected');
  }

  function changeQty(delta) {
    quantity = Math.max(1, Math.min(10, quantity + delta));
    document.getElementById('qty-display').textContent = quantity;
  }

  function handleAddToCart() {
    if (!currentProduct) return;
    if (!selectedSize) { showToast('Please select a size', 'error'); return; }
    addToCart(currentProduct, selectedSize, quantity);
  }

  function handleBuyNow() {
    handleAddToCart();
    setTimeout(() => window.location.href = 'cart.html', 400);
  }

  function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-state').style.display = 'block';
  }

  loadProduct();
</script>
</body>
</html>
