<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#07070f"/>
  <title>Cart — DhupQwik</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .cart-item{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r-lg);
      padding:14px;
      display:flex;gap:14px;
      align-items:center;
      transition:var(--t);
      animation:fadeUp 0.3s ease both;
    }
    .cart-item:hover{border-color:var(--border2);}
    .cart-img{
      width:72px;height:90px;
      border-radius:var(--r-md);
      object-fit:cover;
      background:var(--surface3);
      flex-shrink:0;
    }
    .cart-img-placeholder{
      width:72px;height:90px;
      border-radius:var(--r-md);
      background:var(--surface3);
      display:flex;align-items:center;justify-content:center;
      font-size:24px;flex-shrink:0;
    }
    .cart-info{flex:1;min-width:0;}
    .cart-name{
      font-size:14px;font-weight:600;
      margin-bottom:4px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .cart-size{
      font-size:11px;color:var(--text-muted);
      background:var(--surface2);
      padding:2px 8px;border-radius:var(--r-full);
      display:inline-block;margin-bottom:8px;
    }
    .cart-price{font-size:16px;font-weight:700;color:var(--teal);}
    .cart-price::before{content:'₹';font-size:12px;}

    .cart-controls{
      display:flex;flex-direction:column;
      align-items:flex-end;gap:10px;
    }
    .qty-sm{
      display:flex;align-items:center;
      background:var(--surface2);
      border:1px solid var(--border);
      border-radius:var(--r-full);
      overflow:hidden;
    }
    .qty-btn-sm{
      width:32px;height:32px;
      font-size:16px;font-weight:600;
      color:var(--text-soft);transition:var(--t);
    }
    .qty-btn-sm:hover{color:var(--teal);}
    .qty-btn-sm:active{transform:scale(0.88);}
    .qty-num{
      width:32px;text-align:center;
      font-size:13px;font-weight:700;
      border-left:1px solid var(--border);
      border-right:1px solid var(--border);
    }
    .remove-btn{
      font-size:11px;color:var(--text-muted);
      padding:4px 8px;border-radius:var(--r-full);
      transition:var(--t);
    }
    .remove-btn:hover{background:rgba(244,63,94,0.1);color:var(--red);}

    /* Summary */
    .summary-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r-lg);
      padding:20px;
    }
    .summary-row{
      display:flex;justify-content:space-between;
      font-size:13px;color:var(--text-soft);
      margin-bottom:12px;
    }
    .summary-row.total{
      font-size:17px;font-weight:700;
      color:var(--text);
      border-top:1px solid var(--border);
      padding-top:14px;margin-top:4px;
    }
    .summary-row.total span:last-child{color:var(--teal);}
    .free-delivery{
      background:rgba(16,185,129,0.08);
      border:1px solid rgba(16,185,129,0.2);
      border-radius:var(--r-md);
      padding:10px 14px;
      font-size:12px;color:var(--green);
      margin:14px 0;
      display:flex;align-items:center;gap:8px;
    }

    .cart-layout{display:flex;flex-direction:column;gap:16px;}
    @media(min-width:640px){
      .cart-layout{display:grid;grid-template-columns:1fr 320px;align-items:start;}
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="index.html" style="font-size:20px;margin-right:8px;">←</a>
  <div class="nav-logo"><span class="accent">Dhup</span>Qwik</div>
  <div class="nav-actions"></div>
</header>

<div class="page-body">
<div class="page-container">

  <div style="padding:16px 0 8px;">
    <h1 class="page-title">Your Cart</h1>
    <p class="page-sub" id="cart-subtitle"></p>
  </div>

  <!-- Empty cart -->
  <div class="empty-state" id="empty-cart" style="display:none;">
    <div class="empty-state-icon">🛒</div>
    <h3>Cart is empty</h3>
    <p>Add some clothes to get started!</p>
    <a href="index.html" class="btn btn-primary">Browse Products</a>
  </div>

  <!-- Cart content -->
  <div class="cart-layout" id="cart-content" style="display:none;">

    <!-- Items -->
    <div>
      <div id="cart-items" style="display:flex;flex-direction:column;gap:12px;"></div>
    </div>

    <!-- Summary -->
    <div>
      <div class="summary-card">
        <div style="font-size:15px;font-weight:700;margin-bottom:16px;">Order Summary</div>
        <div class="summary-row">
          <span id="summary-count">Items</span>
          <span id="summary-subtotal"></span>
        </div>
        <div class="summary-row">
          <span>Delivery</span>
          <span style="color:var(--green);font-weight:600;">FREE</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="summary-total"></span>
        </div>
        <div class="free-delivery">🚚 Free home delivery on all orders</div>
        <a href="checkout.html" class="btn btn-primary btn-full btn-lg">
          Checkout →
        </a>
      </div>
    </div>

  </div>
</div>
</div>

<footer class="site-footer">
  <strong>Kartigo</strong> · <span class="credit">© 2026 Kartigo · Designed & Developed by Joyankush</span>
</footer>

<nav class="bottom-nav">
  <a href="index.html" class="bnav-item" data-page="index.html">
    <span class="bnav-icon">🏠</span><span>Home</span>
  </a>
  <a href="orders.html" class="bnav-item" data-page="orders.html">
    <span class="bnav-icon">📦</span><span>Orders</span>
  </a>
  <a href="cart.html" class="bnav-item active" data-page="cart.html">
    <span class="bnav-icon" style="position:relative;">🛒
      <span class="bnav-badge" data-cart-count>0</span>
    </span><span>Cart</span>
  </a>
</nav>

<script src="utils.js"></script>
<script>
  function renderCart() {
    const cart    = getCart();
    const emptyEl = document.getElementById('empty-cart');
    const content = document.getElementById('cart-content');
    const sub     = document.getElementById('cart-subtitle');

    if (cart.length === 0) {
      emptyEl.style.display  = 'block';
      content.style.display  = 'none';
      sub.textContent        = '';
      return;
    }

    const total = getCartTotal();
    const count = getCartCount();
    sub.textContent       = `${count} item${count!==1?'s':''} in your cart`;
    emptyEl.style.display = 'none';
    content.style.display = 'grid';

    document.getElementById('cart-items').innerHTML = cart.map(item => {
      const imgUrl = getImageUrl(item.image);
      const imgHTML = imgUrl
        ? `<img class="cart-img" src="${imgUrl}" alt="${item.name}" onerror="this.style.display='none'">`
        : `<div class="cart-img-placeholder">👕</div>`;
      return `
        <div class="cart-item">
          ${imgHTML}
          <div class="cart-info">
            <div class="cart-name">${item.name}</div>
            <div class="cart-size">Size: ${item.size}</div>
            <div class="cart-price">${(item.price*item.quantity).toLocaleString('en-IN')}</div>
          </div>
          <div class="cart-controls">
            <div class="qty-sm">
              <button class="qty-btn-sm" onclick="changeQty('${item.productId}','${item.size}',-1)">−</button>
              <div class="qty-num">${item.quantity}</div>
              <button class="qty-btn-sm" onclick="changeQty('${item.productId}','${item.size}',1)">+</button>
            </div>
            <button class="remove-btn" onclick="removeItem('${item.productId}','${item.size}')">
              🗑 Remove
            </button>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('summary-count').textContent    = `${count} item${count!==1?'s':''}`;
    document.getElementById('summary-subtotal').textContent = formatPrice(total);
    document.getElementById('summary-total').textContent    = formatPrice(total);
  }

  function changeQty(pid, size, d) {
    const cart = getCart();
    const item = cart.find(i => i.productId===pid && i.size===size);
    if (!item) return;
    const newQty = item.quantity + d;
    if (newQty <= 0) removeFromCart(pid, size);
    else updateCartItemQty(pid, size, newQty);
    renderCart();
  }

  function removeItem(pid, size) {
    removeFromCart(pid, size);
    showToast('Item removed');
    renderCart();
  }

  renderCart();
</script>
</body>
</html>
