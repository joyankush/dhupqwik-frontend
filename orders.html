<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#07070f"/>
  <title>My Orders — DhupQwik</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* Phone prompt */
    .phone-prompt{
      max-width:380px;margin:40px auto;
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--r-xl);padding:32px 24px;text-align:center;
    }
    .phone-prompt-icon{font-size:44px;margin-bottom:14px;}
    .phone-prompt h2{font-size:20px;font-weight:700;margin-bottom:8px;}
    .phone-prompt p{font-size:13px;color:var(--text-soft);margin-bottom:22px;}
    .phone-row{display:flex;gap:10px;}
    .phone-row input{flex:1;}

    /* Orders list */
    .orders-list{display:flex;flex-direction:column;gap:14px;}

    .order-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r-lg);
      overflow:hidden;
      animation:fadeUp 0.35s ease both;
    }
    .order-card-head{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid var(--border);
      flex-wrap:wrap;gap:8px;
    }
    .order-id{
      font-size:11px;font-family:monospace;
      color:var(--text-muted);
      background:var(--surface2);
      padding:3px 10px;border-radius:var(--r-full);
    }
    .order-date{font-size:12px;color:var(--text-muted);}

    /* Status tracker */
    .tracker{
      display:flex;align-items:flex-start;
      padding:16px 16px 8px;
      gap:0;overflow-x:auto;
      scrollbar-width:none;
    }
    .tracker::-webkit-scrollbar{display:none;}
    .t-step{
      display:flex;flex-direction:column;align-items:center;
      gap:5px;flex:1;min-width:64px;position:relative;
    }
    .t-step:not(:last-child)::after{
      content:'';position:absolute;
      top:12px;left:50%;width:100%;height:2px;
      background:var(--surface3);z-index:0;
    }
    .t-step.done:not(:last-child)::after{background:var(--teal);}
    .t-dot{
      width:26px;height:26px;border-radius:50%;
      border:2px solid var(--surface3);
      background:var(--card);
      display:flex;align-items:center;justify-content:center;
      font-size:12px;z-index:1;transition:var(--t);
    }
    .t-step.done .t-dot{background:var(--teal);border-color:var(--teal);}
    .t-step.current .t-dot{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow);}
    .t-label{
      font-size:9px;color:var(--text-muted);
      text-align:center;font-weight:500;white-space:nowrap;
    }
    .t-step.done .t-label,.t-step.current .t-label{color:var(--teal);font-weight:600;}

    /* Items */
    .order-items{padding:14px 16px 0;}
    .order-items-title{
      font-size:11px;font-weight:600;
      text-transform:uppercase;letter-spacing:0.6px;
      color:var(--text-muted);margin-bottom:10px;
    }
    .order-item-row{
      display:flex;justify-content:space-between;
      align-items:center;font-size:13px;gap:12px;
      padding:6px 0;border-bottom:1px solid var(--border);
    }
    .order-item-row:last-child{border-bottom:none;}
    .order-item-name{flex:1;font-weight:500;}
    .order-item-meta{font-size:11px;color:var(--text-muted);}
    .order-item-price{font-weight:600;color:var(--teal);white-space:nowrap;}
    .order-item-price::before{content:'₹';font-size:10px;}

    /* Footer of order card */
    .order-card-foot{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 16px;
      background:var(--surface);
      border-top:1px solid var(--border);
      flex-wrap:wrap;gap:8px;
    }
    .order-total{font-size:15px;font-weight:700;}
    .order-total span{color:var(--teal);}
    .order-addr{font-size:11px;color:var(--text-muted);max-width:240px;}

    /* Top row */
    .orders-top-row{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:20px;flex-wrap:wrap;gap:10px;
    }
    .viewing-label{font-size:13px;color:var(--text-soft);}
    .change-phone-btn{
      font-size:12px;color:var(--teal);
      padding:6px 14px;border-radius:var(--r-full);
      border:1px solid var(--border-teal);transition:var(--t);
    }
    .change-phone-btn:hover{background:var(--teal-glow);}
  </style>
</head>
<body>

<header class="site-header">
  <div class="nav-logo"><span class="accent">Dhup</span>Qwik</div>
  <div class="nav-actions">
    <a href="cart.html" class="nav-icon-btn">🛒
      <span class="nav-badge" data-cart-count>0</span>
    </a>
  </div>
</header>

<div class="page-body">
<div class="page-container">

  <div style="padding:16px 0 8px;">
    <h1 class="page-title">My Orders</h1>
    <p class="page-sub">Track your past and current orders.</p>
  </div>

  <!-- Phone prompt -->
  <div id="phone-prompt" style="display:none;">
    <div class="phone-prompt fade-up">
      <div class="phone-prompt-icon">📱</div>
      <h2>Enter Your Number</h2>
      <p>We'll show all orders linked to your mobile number.</p>
      <div class="phone-row">
        <input type="tel" class="form-input" id="prompt-phone"
          placeholder="10-digit mobile number" maxlength="10"/>
        <button class="btn btn-primary" onclick="loadByPhone()">View</button>
      </div>
    </div>
  </div>

  <!-- Orders section -->
  <div id="orders-section" style="display:none;">
    <div class="orders-top-row">
      <div class="viewing-label" id="viewing-label"></div>
      <button class="change-phone-btn" onclick="changePhone()">Change Number</button>
    </div>

    <div class="loading-wrap" id="orders-loading" style="display:none;">
      <div class="spinner"></div>
    </div>

    <div class="empty-state" id="orders-empty" style="display:none;">
      <div class="empty-state-icon">📭</div>
      <h3>No orders found</h3>
      <p>You haven't placed any orders with this number.</p>
      <a href="index.html" class="btn btn-primary">Start Shopping</a>
    </div>

    <div class="orders-list" id="orders-list"></div>
  </div>

</div>
</div>

<footer class="site-footer">
  <strong>DhupQwik</strong> · <span class="credit">Built by <a href="#">Joyankush Roy</a></span>
</footer>

<nav class="bottom-nav">
  <a href="index.html" class="bnav-item" data-page="index.html">
    <span class="bnav-icon">🏠</span><span>Home</span>
  </a>
  <a href="orders.html" class="bnav-item active" data-page="orders.html">
    <span class="bnav-icon">📦</span><span>Orders</span>
  </a>
  <a href="cart.html" class="bnav-item" data-page="cart.html">
    <span class="bnav-icon" style="position:relative;">🛒
      <span class="bnav-badge" data-cart-count>0</span>
    </span><span>Cart</span>
  </a>
</nav>

<script src="utils.js"></script>
<script>
  const STEPS = [
    { key:'pending',          label:'Pending',  icon:'🕐' },
    { key:'confirmed',        label:'Confirmed',icon:'✅' },
    { key:'out for delivery', label:'On Way',   icon:'🚴' },
    { key:'delivered',        label:'Delivered',icon:'📦' }
  ];

  function buildTracker(status) {
    if (status === 'cancelled') return `<div style="padding:12px 16px;color:var(--red);font-size:13px;font-weight:600;">❌ This order was cancelled.</div>`;
    const idx = STEPS.findIndex(s => s.key === status);
    return `
      <div class="tracker">
        ${STEPS.map((s, i) => {
          const done    = i <= idx;
          const current = i === idx;
          return `
            <div class="t-step ${done?'done':''} ${current?'current':''}">
              <div class="t-dot">${done ? s.icon : ''}</div>
              <div class="t-label">${s.label}</div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  function buildOrderCard(order) {
    const items = order.items || [];
    const itemsHTML = items.map(item => `
      <div class="order-item-row">
        <div>
          <span class="order-item-name">${item.name}</span>
          <span class="order-item-meta"> · ${item.size} · ×${item.quantity}</span>
        </div>
        <div class="order-item-price">${(item.price*item.quantity).toLocaleString('en-IN')}</div>
      </div>
    `).join('');

    return `
      <div class="order-card">
        <div class="order-card-head">
          <div>
            <div class="order-id">#${order._id.slice(-8).toUpperCase()}</div>
            <div class="order-date" style="margin-top:4px;">📅 ${formatDate(order.createdAt)}</div>
          </div>
          ${statusBadgeHTML(order.status)}
        </div>
        ${buildTracker(order.status)}
        <div class="order-items">
          <div class="order-items-title">Items Ordered</div>
          ${itemsHTML}
        </div>
        <div class="order-card-foot">
          <div>
            <div class="order-total">Total: <span>₹${(order.totalPrice||0).toLocaleString('en-IN')}</span></div>
            <div class="order-addr">📍 ${order.address}</div>
          </div>
          <span style="font-size:11px;color:var(--text-muted);">
            ${order.paymentMethod==='Online Payment'?'💳 Paid Online':'💵 COD'}
          </span>
        </div>
      </div>
    `;
  }

  async function fetchOrders(phone) {
    document.getElementById('orders-loading').style.display = 'block';
    document.getElementById('orders-empty').style.display   = 'none';
    document.getElementById('orders-list').innerHTML        = '';
    try {
      const res  = await fetch(`${API_BASE}/orders/phone/${phone}`);
      const data = await res.json();
      const orders = Array.isArray(data) ? data : (data.orders || []);
      document.getElementById('orders-loading').style.display = 'none';
      if (!orders || orders.length === 0) {
        document.getElementById('orders-empty').style.display = 'block';
        return;
      }
      document.getElementById('orders-list').innerHTML = orders.map(buildOrderCard).join('');
    } catch {
      document.getElementById('orders-loading').style.display = 'none';
      document.getElementById('orders-empty').innerHTML = `
        <div class="empty-state-icon">⚠️</div>
        <h3>Cannot connect</h3><p>Make sure the backend is running.</p>
      `;
      document.getElementById('orders-empty').style.display = 'block';
    }
  }

  function loadByPhone() {
    const phone = document.getElementById('prompt-phone').value.trim();
    if (!/^[6-9]\d{9}$/.test(phone)) { showToast('Enter a valid 10-digit number', 'error'); return; }
    setCustomerPhone(phone);
    showOrdersFor(phone);
  }

  function showOrdersFor(phone) {
    document.getElementById('phone-prompt').style.display  = 'none';
    document.getElementById('orders-section').style.display = 'block';
    document.getElementById('viewing-label').textContent   = `📱 ${phone}`;
    fetchOrders(phone);
  }

  function changePhone() {
    logoutCustomer();
    document.getElementById('orders-section').style.display = 'none';
    document.getElementById('phone-prompt').style.display   = 'block';
    document.getElementById('prompt-phone').value           = '';
  }

  document.getElementById('prompt-phone')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') loadByPhone();
  });

  document.addEventListener('DOMContentLoaded', () => {
    const phone = getCustomerPhone();
    if (phone) showOrdersFor(phone);
    else document.getElementById('phone-prompt').style.display = 'block';
  });
</script>
</body>
</html>
